# render.yaml - BordGameSpace 部署設定
services:
  - type: web
    name: boardmember
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    # Explicitly tell Render to use port 10000
    port: 10000
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: PORT
        value: "10000"
