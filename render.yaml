# render.yaml - BordGameSpace 部署設定
services:
  - type: web
    name: boardmember
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
        # 替換為你的 Supabase 密碼
        # 格式：Host=aws-1-ap-southeast-1.pooler.supabase.com;Port=6543;Database=postgres;Username=postgres;Password=你的密碼;Pooling=true
