# render.yaml - BordGameSpace 部署設定
# 請在 Render Dashboard 建立 Web Service，並連接此 GitHub Repo
# 或直接使用此檔案：render yaml deploy

services:
  - type: web
    name: boardmember
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
        # 範例格式，部署前請至 Render 設定替換
        # value: "Host=aws-0-xx.pooler.supabase.com;Port=6543;Database=postgres;Username=postgres.xxx;Password=YOUR_PASSWORD;Pooling=true"
