# render.yaml - BordGameSpace 部署設定
services:
  - type: web
    name: boardmember
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    # Match the port ASP.NET Core binds to (default 8080)
    port: 8080
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
